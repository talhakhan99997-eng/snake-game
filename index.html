<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Polished Snake Game</title>
<style>
  body {margin:0; overflow:hidden; background:#111;}
  canvas {display:block;}
  #score {
    position:absolute; top:10px; left:10px;
    color:white; font-family:Arial; font-size:18px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="score">Score: 0</div>

<!-- Sounds -->
<audio id="eatSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="deathSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const eatSound = document.getElementById("eatSound");
const deathSound = document.getElementById("deathSound");

const mapSize = 2000;
let snake = [{x: mapSize/2, y: mapSize/2, dx:0, dy:0}];
let direction = {x:0, y:0};
let food = [];
let score = 0;

// Create initial food
for(let i=0;i<50;i++){
  food.push({x: Math.random()*mapSize, y: Math.random()*mapSize});
}

let keys = {};
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") keys.up=true;
  if(e.key==="ArrowDown") keys.down=true;
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
});
document.addEventListener("keyup", e=>{
  if(e.key==="ArrowUp") keys.up=false;
  if(e.key==="ArrowDown") keys.down=false;
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
});

function gameLoop(){
  // Update direction
  if(keys.up) {direction.x=0; direction.y=-5;}
  if(keys.down) {direction.x=0; direction.y=5;}
  if(keys.left) {direction.x=-5; direction.y=0;}
  if(keys.right) {direction.x=5; direction.y=0;}

  // Move head
  const head = {x: snake[0].x+direction.x, y: snake[0].y+direction.y};
  snake.unshift(head);

  // Wrap around map edges
  if(head.x < 0) head.x = mapSize;
  if(head.x > mapSize) head.x = 0;
  if(head.y < 0) head.y = mapSize;
  if(head.y > mapSize) head.y = 0;

  // Eat food
  for(let i=food.length-1;i>=0;i--){
    const f = food[i];
    const dx = head.x - f.x;
    const dy = head.y - f.y;
    if(Math.sqrt(dx*dx + dy*dy) < 15){
      food.splice(i,1);
      food.push({x: Math.random()*mapSize, y: Math.random()*mapSize});
      eatSound.play();
      score++;
      snake.push({...head}); // grow
    }
  }

  // Collision with self
  for(let i=1;i<snake.length;i++){
    const s = snake[i];
    const dx = head.x - s.x;
    const dy = head.y - s.y;
    if(Math.sqrt(dx*dx + dy*dy) < 10){
      deathSound.play();
      snake = [{x: mapSize/2, y: mapSize/2, dx:0, dy:0}];
      score = 0;
      direction={x:0,y:0};
    }
  }

  // Limit snake length for performance
  if(snake.length>300) snake.pop();

  // Camera
  const offsetX = canvas.width/2 - head.x;
  const offsetY = canvas.height/2 - head.y;

  // Draw
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(offsetX, offsetY);

  // Draw food (cartoon apple style)
  food.forEach(f=>{
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(f.x, f.y, 10,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="green";
    ctx.fillRect(f.x-2,f.y-15,4,5);
  });

  // Draw snake
  for(let i=0;i<snake.length;i++){
    const s = snake[i];
    const gradient = ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,10);
    gradient.addColorStop(0,"#a6ff00");
    gradient.addColorStop(1,"#00ff3c");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(s.x,s.y,10,0,Math.PI*2);
    ctx.fill();
  }

  // Draw snake eyes on head
  const headSnake = snake[0];
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(headSnake.x-4, headSnake.y-4, 3,0,Math.PI*2);
  ctx.arc(headSnake.x+4, headSnake.y-4, 3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(headSnake.x-4, headSnake.y-4, 1.5,0,Math.PI*2);
  ctx.arc(headSnake.x+4, headSnake.y-4, 1.5,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  document.getElementById("score").innerHTML = "Score: "+score;

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
